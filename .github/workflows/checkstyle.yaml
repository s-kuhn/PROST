name: Checkstyle
on:
  pull_request:
    branches:
      - main
jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          java-version: 23
      - name: Install dependencies
        run: mvn install
      - name: Run Spotless
        run: mvn spotless:check
      - name: Run Checkstyle
        run: mvn checkstyle:check
