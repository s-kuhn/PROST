name: Checkstyle
on:
  pull_request:

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: 23
          distribution: 'temurin'
      - name: Install dependencies
        run: mvn install
      - name: Run Spotless
        run: mvn spotless:check
      - name: Run Checkstyle
        run: mvn checkstyle:check
