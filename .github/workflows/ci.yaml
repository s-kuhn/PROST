name: CI

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: "ci-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Build and test backend
        working-directory: server
        run: mvn -ntp clean verify -DskipTests
      - name: Run Spotless
        working-directory: server
        run: mvn -ntp spotless:check

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/prost-frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend/prost-frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend/prost-frontend
        run: npm run lint
#      - name: Test frontend
#        working-directory: frontend/prost-frontend
#        run: npm run test:ci
      - name: Build frontend
        working-directory: frontend/prost-frontend
        run: npm run build:prod

  keycloak-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Build Keycloak plugin
        working-directory: keycloak-webhook-event-listener
        run: mvn -ntp clean package
