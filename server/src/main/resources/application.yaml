spring:
  application:
    name: prost
  jpa:
    open-in-view: false

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:prost}
    username: ${POSTGRES_USER:prost}
    password: ${POSTGRES_PASSWORD}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_INTERNAL_URL:http://localhost:8081}/realms/${KEYCLOAK_REALM:prost}
          jwk-set-uri: ${KEYCLOAK_INTERNAL_URL:http://localhost:8081}/realms/${KEYCLOAK_REALM:prost}/protocol/openid-connect/certs

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  auth:
    converter:
      principle_attribute: preferred_username
      resource_id: ${KEYCLOAK_BACKEND_CLIENT_ID:prost-rest-api}

server:
  servlet:
    context-path: /prost
    session:
      persistent: false
  forward-headers-strategy: native

logging:
  level:
    de.skuhn.prost: DEBUG
